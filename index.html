<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script_avaliacao.js" defer></script>
    <title>Avaliação - Lote de AP</title>
</head>
<body>
    
    <div id="geral"> 
        <h3>Calculo de lote</h3>
        <p> O Valor do m² quadrado da área está fixado em R$ 550,00.</p>
        <p> Insira os dados solicitados, no final será informado a área em m² do seu lote, o valor que deverá pagar pelo lote e a taxa sobre o seu lote.</p>
    </div>

    <div id="form">
        <form id="form-lote">

        <label for="quadra"> Número da Quadra </label>
        <input type="number" name="quadra" id="quadra" required>

        <label for="lote"> Número do lote </label>
        <input type="number" name="lote" id="lote" required> 

        <label for="largura"> Largura </label>
        <input type="number" name="largura" id="largura" required>

        <label for="comprimento"> Comprimento </label>
        <input type="number" name="comprimento" id="comprimento" required>

        <button type="submit" name="submit" id="submit"> Calcular </button>
        <button type="reset"> Reset </button>


        </form>
    </div>

    <div id="resultado-lote">

    </div>


</body>
</html>
